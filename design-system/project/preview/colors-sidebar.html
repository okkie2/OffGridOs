<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--sidebar-bg); font-family: var(--font-sans); }
  .sidebar-preview {
    width: 240px; min-height: 320px; background: var(--sidebar-bg);
    display: flex; flex-direction: column; padding: 16px 0;
  }
  .logo-area { padding: 0 16px 16px; border-bottom: 1px solid var(--sidebar-border); margin-bottom: 12px; }
  .logo-text { font-size: 0.9rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--sidebar-active-text); }
  .logo-sub { font-size: 0.68rem; color: var(--sidebar-muted); margin-top: 2px; letter-spacing: 0.04em; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 11.5px 18px; font-size: 0.82rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; color: var(--sidebar-muted);
    cursor: pointer;
  }
  .nav-item.active { background: var(--sidebar-active-bg); color: var(--sidebar-active-text); }
  .nav-item.hover { color: var(--sidebar-text); background: rgba(255,255,255,0.04); }
  .nav-icon { width: 18px; height: 18px; background: var(--sidebar-muted); border-radius: 3px; opacity: 0.6; flex-shrink: 0; }
  .sub-nav { padding: 0 0 8px 0; margin: 0 0 4px 0; }
  .sub-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px 8px 36px; font-size: 0.73rem; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase; color: var(--sidebar-muted);
  }
  .sub-item.active { color: var(--sidebar-active-text); background: rgba(0,255,194,0.12); }
  .footer { padding: 14px 16px 0; border-top: 1px solid var(--sidebar-border); margin-top: 10px; }
  .stamp { font-size: 0.65rem; color: var(--sidebar-muted); letter-spacing: 0.04em; margin-top: 6px; }
  .color-row { display: flex; flex-wrap: wrap; gap: 8px; padding: 16px 16px 0; }
  .cswatch { display: flex; flex-direction: column; gap: 3px; align-items: center; }
  .cswatch-block { width: 44px; height: 28px; border-radius: 4px; }
  .cswatch-name { font-size: 0.56rem; color: var(--sidebar-muted); letter-spacing: 0.03em; text-align: center; }
</style>
</head>
<body>
  <div style="display: flex; gap: 0;">
    <div class="sidebar-preview">
      <div class="logo-area">
        <div class="logo-text">OffGridOS</div>
        <div class="logo-sub">Digital Twin</div>
      </div>
      <div class="nav-item"><div class="nav-icon"></div> Location</div>
      <div class="nav-item active"><div class="nav-icon"></div> Production <span style="margin-left:auto; font-size:0.85rem; opacity:0.7;">▾</span></div>
      <div class="sub-nav">
        <div class="sub-item active"><div class="nav-icon" style="width:14px;height:14px;"></div> NW face</div>
        <div class="sub-item"><div class="nav-icon" style="width:14px;height:14px;"></div> SE face</div>
      </div>
      <div class="nav-item"><div class="nav-icon"></div> Storage</div>
      <div class="nav-item"><div class="nav-icon"></div> Consumption <span style="margin-left:auto; font-size:0.85rem; opacity:0.7;">▸</span></div>
      <div class="nav-item"><div class="nav-icon"></div> Reports <span style="margin-left:auto; font-size:0.85rem; opacity:0.7;">▸</span></div>
      <div class="nav-item"><div class="nav-icon"></div> Catalogs <span style="margin-left:auto; font-size:0.85rem; opacity:0.7;">▸</span></div>
      <div class="footer">
        <div class="nav-item" style="padding: 8px 0; opacity: 0.35; font-size: 0.75rem;">New project</div>
        <div class="stamp">v1.0.0 · build 2026</div>
      </div>
    </div>
    <div class="color-row" style="flex-direction: column; justify-content: center; padding: 16px 24px;">
      <div style="font-size: 0.62rem; font-weight: 700; letter-spacing: 0.10em; text-transform: uppercase; color: var(--sidebar-muted); margin-bottom: 8px;">Sidebar Tokens</div>
      <div style="display: flex; flex-wrap: wrap; gap: 8px;">
        <div class="cswatch"><div class="cswatch-block" style="background:#0b1326;"></div><div class="cswatch-name">sidebar-bg</div></div>
        <div class="cswatch"><div class="cswatch-block" style="background:#171f33;"></div><div class="cswatch-name">active-bg</div></div>
        <div class="cswatch"><div class="cswatch-block" style="background:#00ffc2;"></div><div class="cswatch-name">active-text</div></div>
        <div class="cswatch"><div class="cswatch-block" style="background:#dae2fd;"></div><div class="cswatch-name">text</div></div>
        <div class="cswatch"><div class="cswatch-block" style="background:#83958c;"></div><div class="cswatch-name">muted</div></div>
      </div>
    </div>
  </div>
</body>
</html>
