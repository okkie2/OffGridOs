<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg); font-family: var(--font-sans); }
  .panel { background: var(--surface); border: 1px solid var(--border); padding: 20px; border-radius: 10px; display: flex; flex-direction: column; gap: 10px; }
  .field { display: grid; gap: 4px; }
  .field span { font-size: 0.72rem; font-family: var(--font-sans); text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
  .field input, .field select {
    width: 100%; height: 40px; padding: 8px 12px;
    border: 1px solid var(--border); background: var(--surface-low);
    color: var(--text); font-family: var(--font-sans); font-size: 0.88rem;
    border-radius: 8px; box-sizing: border-box; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(0,201,160,0.15); }
  .field textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); background: var(--surface-low);
    color: var(--text); font-family: var(--font-sans); font-size: 0.88rem;
    border-radius: 8px; resize: vertical; min-height: 72px;
    box-sizing: border-box; outline: none;
  }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
</style>
</head>
<body>
<div class="panel">
  <div class="three-col">
    <div class="field">
      <span>Panel count</span>
      <input type="number" value="7" />
    </div>
    <div class="field">
      <span>Panels per string</span>
      <input type="number" value="7" />
    </div>
    <div class="field">
      <span>Parallel strings</span>
      <input type="number" value="1" />
    </div>
  </div>

  <div class="two-col">
    <div class="field">
      <span>Panel type</span>
      <select>
        <option>Canadian BiHiKu6 Rood</option>
        <option>Aiko 475 All Black</option>
      </select>
    </div>
    <div class="field">
      <span>MPPT type</span>
      <select>
        <option>Victron SmartSolar 250/100</option>
      </select>
    </div>
  </div>

  <div class="field">
    <span>Notes</span>
    <textarea placeholder="Optional notes about this surface..."></textarea>
  </div>
  </div>

</body>
</html>
